version: '3.8'

services:
  # PostgreSQL with PostGIS for Spatial data and core API metadata
  postgres:
    image: postgis/postgis:15-3.3
    container_name: rakshak_postgres
    environment:
      POSTGRES_USER: rakshak_user
      POSTGRES_PASSWORD: rakshak_password
      POSTGRES_DB: rakshak_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rakshak_user -d rakshak_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Neo4j for Graph Data (USP 2)
  neo4j:
    image: neo4j:5-community
    container_name: rakshak_neo4j
    environment:
      NEO4J_AUTH: neo4j/rakshak_graph_pass
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data

  # Elasticsearch for Search and Text indexing (USP 3)
  elasticsearch:
    image: elasticsearch:8.10.2
    container_name: rakshak_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # Redis for Background jobs and Caching
  redis:
    image: redis:7-alpine
    container_name: rakshak_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # MinIO for File Storage (Alternative to S3)
  minio:
    image: minio/minio
    container_name: rakshak_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: rakshak_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Kafka for Event Streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: rakshak_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # MongoDB for Child Protection Service
  mongodb:
    image: mongo:6-jammy
    container_name: rakshak_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Child Protection Backend (Node.js)
  child_protection:
    build:
      context: ./services/child_protection
    container_name: rakshak_child_protection
    depends_on:
      - mongodb
    environment:
      MONGO_URI: "mongodb://mongodb:27017/child_recovery"
      PORT: 5000
    ports:
      - "5000:5000"

  # Community Watch Backend (Node.js)
  community_watch:
    build:
      context: ./services/community_watch
    container_name: rakshak_community_watch
    depends_on:
      - mongodb
    environment:
      MONGO_URI: "mongodb://mongodb:27017/community_watch"
      PORT: 5001
    ports:
      - "5001:5001"

volumes:
  postgres_data:
  neo4j_data:
  es_data:
  redis_data:
  minio_data:
  mongodb_data:
